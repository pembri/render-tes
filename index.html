<!DOCTYPE html>
<html>
<body>
    <h1>Tes Backend Python</h1>
    <button onclick="panggilPython()">Tes Python</button>
    <p id="hasil">Hasil: -</p>

    <script>
        async function panggilPython() {
            // GANTI URL ini dengan link Vercel kamu nanti
            const url = "https://python-test-fyon.vercel.app";
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                document.getElementById('hasil').innerText = data.pesan;
            } catch (e) {
                document.getElementById('hasil').innerText = "Error: " + e;
            }
        }
    </script>
</body>
</html>
