<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloudflare + Replit Python</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#0f0f0f;
      color:white;
      font-family:Arial,sans-serif;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      padding:20px;
    }

    h1{
      margin-bottom:20px;
      color:#00ff88;
    }

    button{
      padding:14px 24px;
      border:none;
      border-radius:12px;
      background:#00ff88;
      color:#000;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{
      opacity:.9;
    }

    #hasil{
      margin-top:30px;
      width:100%;
      max-width:600px;
      background:#1a1a1a;
      border-radius:12px;
      padding:20px;
      white-space:pre-wrap;
      word-wrap:break-word;
      border:1px solid #333;
      color:#00ff88;
    }
  </style>
</head>
<body>

<h1>Cloudflare → Replit Python</h1>

<button onclick="tesApi()">
Tes Sambungan API
</button>

<div id="hasil">
Belum ada request
</div>

<script>

async function tesApi(){

  const hasil = document.getElementById("hasil");

  hasil.innerHTML = "Loading API...";

  try{

    // GANTI DENGAN URL REPLIT KAMU
    const response = await fetch(
      "https://python-test--ahmadsupembri.replit.app/api"
    );

    const data = await response.json();

    hasil.innerHTML =
      JSON.stringify(data, null, 2);

  }catch(err){

    hasil.innerHTML =
      "Gagal connect:\n\n" + err;

  }

}

</script>

</body>
</html>
